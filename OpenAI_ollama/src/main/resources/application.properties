spring.application.name=spirng-ai

server.port = 8081


# OpenAI API key

# spring.ai.openai.api-key={OPENAI_API}



# Ollama API key
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=codellama:latest

# This setting configures the randomness and creativity of your local AI model
# \(0.0\) to \(0.3\) (Highly Focused)
# \(0.4\) to \(0.6\) (Balanced)
# \(0.7\) to \(1.0\) (Highly Creative)
spring.ai.ollama.chat.options.temperature=0.7


logging.level.org.springframework.ai.ollama=DEBUG