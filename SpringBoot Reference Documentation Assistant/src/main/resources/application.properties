spring.application.name=spirng-ai

server.port = 8082


# OpenAI API key

spring.ai.openai.api-key={OPEN_AI_API}
# Ollama API key


spring.ai.ollama.base-url=http://localhost:11434


# your chat model (codellama is fine here)
spring.ai.ollama.chat.options.model=codellama:latest

# embedding model - must be a dedicated embedding model
spring.ai.ollama.embedding.options.model=nomic-embed-text


logging.level.org.springframework.ai.ollama=DEBUG